version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rut-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rut_airport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./app 
      dockerfile: Dockerfile
    container_name: rut-airport-api
    restart: always
    depends_on:
      - db
    ports:
      - "5254:8080"
    environment:
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=rut_airport;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./app/data:/app/data

volumes:
  postgres_data: